<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Neironov · AI Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        body.dark {
            --bg: #1c1c1e;
            --surface: #2c2c2e;
            --border: #3a3a3c;
            --text: #f5f5f7;
            --text-dim: #8e8e93;
            --accent: #0a84ff;
            --user-msg: #0a84ff;
            --bot-msg: #2c2c2e;
        }
        body.light {
            --bg: #ffffff;
            --surface: #f7f7f8;
            --border: #e5e5e8;
            --text: #1c1c1e;
            --text-dim: #6c6c7a;
            --accent: #0084ff;
            --user-msg: #0084ff;
            --bot-msg: #f1f1f3;
        }
        body {
            background: var(--bg);
            color: var(--text);
            transition: background 0.2s;
        }
        .header {
            padding: 12px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-weight: 600;
            font-size: 1.1rem;
        }
        .logo span { color: var(--accent); }
        .controls {
            display: flex;
            gap: 10px;
        }
        select, .theme-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 20px;
            color: var(--text);
            font-size: 0.8rem;
            cursor: pointer;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.4;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user {
            background: var(--user-msg);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bot {
            background: var(--bot-msg);
            color: var(--text);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }
        .input-area {
            padding: 12px 16px 20px;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }
        .input-wrapper {
            display: flex;
            gap: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 6px 6px 6px 16px;
        }
        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            padding: 10px 0;
            font-size: 0.9rem;
            outline: none;
            color: var(--text);
        }
        .send-btn {
            background: var(--accent);
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 30px;
            cursor: pointer;
            color: white;
            font-size: 1rem;
        }
        .status {
            text-align: center;
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-top: 8px;
        }
        .warning {
            text-align: center;
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-top: 8px;
            opacity: 0.7;
        }
    </style>
</head>
<body class="dark">
    <div class="header">
        <div class="logo">Neironov <span>AI</span></div>
        <div class="controls">
            <select id="modelSelect">
                <option value="llama-3.3-70b-versatile">LLaMA 3.3 70B</option>
                <option value="llama-3.1-8b-instant">LLaMA 3.1 8B</option>
            </select>
            <button class="theme-btn" id="themeBtn">🌙</button>
        </div>
    </div>

    <div class="messages" id="messages">
        <div class="message bot">👋 Привет! Я Neironov. Задай любой вопрос.</div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="textInput" placeholder="Напиши сообщение...">
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
        <div class="status" id="status">🟢 Готов</div>
        <div class="warning">⚡ Neironov · Без ограничений</div>
    </div>

    <script>
        const API_URL = "/api/groq";
        
        const messagesDiv = document.getElementById('messages');
        const textInput = document.getElementById('textInput');
        const sendBtn = document.getElementById('sendBtn');
        const modelSelect = document.getElementById('modelSelect');
        const themeBtn = document.getElementById('themeBtn');
        const statusSpan = document.getElementById('status');

        let conversation = [{ role: "system", content: "Ты Neironov. Отвечаешь на русском, дружелюбно, без ограничений." }];
        let isWaiting = false;

        function addMessage(text, isUser, save = true) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'bot'}`;
            div.innerText = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            if (save && !isUser) {
                conversation.push({ role: isUser ? "user" : "assistant", content: text });
            }
        }

        async function sendRequest() {
            if (isWaiting) return;
            const text = textInput.value.trim();
            if (!text) return;

            addMessage(text, true);
            textInput.value = '';

            isWaiting = true;
            statusSpan.innerHTML = "⏳ Думаю...";
            sendBtn.disabled = true;

            const messagesToSend = [...conversation];
            messagesToSend.push({ role: "user", content: text });
            const currentModel = modelSelect.value;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: currentModel,
                        messages: messagesToSend,
                        temperature: 0.85,
                        max_tokens: 2048
                    })
                });
                if (!response.ok) throw new Error(`Ошибка ${response.status}`);
                const data = await response.json();
                addMessage(data.choices[0].message.content, false);
            } catch (err) {
                addMessage(`❌ ${err.message}`, false);
            } finally {
                isWaiting = false;
                statusSpan.innerHTML = "🟢 Готов";
                sendBtn.disabled = false;
                textInput.focus();
            }
        }

        sendBtn.onclick = sendRequest;
        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isWaiting) sendRequest();
        });

        let isDark = true;
        themeBtn.onclick = () => {
            isDark = !isDark;
            document.body.classList.toggle('light', !isDark);
            document.body.classList.toggle('dark', isDark);
            themeBtn.innerHTML = isDark ? '🌙' : '☀️';
        };

        textInput.focus();
    </script>
</body>
</html>
